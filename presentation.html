<h2 id="principle-of-organization">Principle of Organization</h2>
<ol>
<li>Doing a lot of different things can get complicated</li>
<li>Organize the actions into sub-actions, group data together</li>
<li>Make sure the sub-actions and groups are <em>&quot;modular&quot;</em></li>
<li>Modular actions and data groups can now be used as built-ins</li>
</ol>
<p>Programmers build tools to write programs, they extend and control their <strong>context</strong></p>
<ul>
<li>Is not &quot;endless&quot; - there is an end-state of a &quot;product&quot;</li>
</ul>
</section>

<h2 id="paradigms-and-semantics">Paradigms and Semantics</h2>
<small>
<ul>
<li><strong>&quot;Mutable&quot;</strong> Data - variables that can have their contents mutated / changed</li>
<li><strong>&quot;Pure&quot;</strong> Functions - functions that don't cause side-effects</li>
<li><strong>&quot;Imperative&quot;</strong> vs. <strong>&quot;Functional&quot;</strong> - sequence of steps vs. composition of results</li>
<li><strong>&quot;Compiled&quot;</strong> vs. <strong>&quot;Interpreted&quot;</strong> - CPU executes the program via translation ahead of time, or just-in-time translation via an <em>interpreter</em></li>
</ul>
</small>
<h3 id="types-of-data">Types of Data</h3>
<ul>
<li>Object-Oriented, Mutable Objects that Contain Methods</li>
<li>Algebraic Data Types, Separate Enumerations and Structures</li>
<li>Inheritance, Traits, Generics - Means By Which Code Is Shared</li>
</ul>

<div>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rs"><span class="hljs-keyword">struct</span> <span class="hljs-title class_">Foo</span> {

<p>TypeScript:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-ts"><span class="hljs-keyword">type</span> <span class="hljs-title class_">Foo</span> = {
  <span class="hljs-attr">fieldOne</span>: <span class="hljs-built_in">number</span>,

</code></pre>

<div>

<p>OOP:</p>

</div>
</div>

<h2 id="algebraic-data-types-1">Algebraic Data Types</h2>
<p>Enumeration / Enum:</p>
<small>
<div class="columns">
<div>
<p>Rust:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rs"><span class="hljs-keyword">enum</span> <span class="hljs-title class_">Bar</span> {
  <span class="hljs-title function_ invoke__">OnePossibility</span>(<span class="hljs-type">i32</span>),
  <span class="hljs-title function_ invoke__">OtherPossibility</span>(<span class="hljs-type">String</span>),
  YetAnotherPossibility,
}
</code></pre>
</div>
<div>
<p>Haskell:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-hs"><span class="hljs-class"><span class="hljs-keyword">data</span> <span class="hljs-type">Bar</span></span>
  = <span class="hljs-type">OnePossibility</span> <span class="hljs-type">Integer</span>
  | <span class="hljs-type">OtherPossibility</span> <span class="hljs-type">String</span>
  | <span class="hljs-type">YetAnotherPossibility</span>
</code></pre>
</div>
</div>
<p>A <code>Bar</code> must be either a <code>OnePossibility</code> holding a <code>i32</code>/<code>Integer</code>, a <code>OtherPossibility</code> holding a <code>String</code>, or a <code>YetAnotherPossibility</code>, which doesn't hold anything.</p>
</small>
</section>

<h2 id="why-algebraic">Why &quot;Algebraic&quot;?</h2>
<ul>
<li>Struct = Product</li>
<li>Enum = Sum</li>
</ul>

<h2 id="why-lambda-calculus">Why Lambda Calculus?</h2>
<p>In <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.027ex;" xmlns="http://www.w3.org/2000/svg" width="1.319ex" height="1.597ex" role="img" focusable="false" viewBox="0 -694 583 706"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D706" d="M166 673Q166 685 183 694H202Q292 691 316 644Q322 629 373 486T474 207T524 67Q531 47 537 34T546 15T551 6T555 2T556 -2T550 -11H482Q457 3 450 18T399 152L354 277L340 262Q327 246 293 207T236 141Q211 112 174 69Q123 9 111 -1T83 -12Q47 -12 47 20Q47 37 61 52T199 187Q229 216 266 252T321 306L338 322Q338 323 288 462T234 612Q214 657 183 657Q166 657 166 673Z"></path></g></g></g></svg></mjx-container>, functions are treated as data - functions can be returned from functions, functions can be passed to functions</p>
<p>Many programming languages' <code>function</code> keyword aren't lambdas, but they do support lambdas in different ways:</p>
<ul>
<li>Rust and Ruby is <code>|x| x + 5</code></li>
<li>JavaScript is <code>x =&gt; x + 5</code></li>
<li>C++ is weird, idk how it works</li>
<li>Haskell uses lambdas natively</li>
</ul>
</section>
