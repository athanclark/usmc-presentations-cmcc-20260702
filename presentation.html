<h1 id="outline">Outline</h1>
<p>This deck moves in seven parts, from vocabulary to a full imaging workflow:</p>
<ol>

<li><strong>Authorization, Custody, and Records</strong> — who may sign, how to validate them, and what records prove custody.</li>
<li><strong>Moving Classified Assets</strong> — courier, packaging, transport, and acceptance requirements.</li>
<li><strong>Inventory and Accountability</strong> — keeping both units' records true.</li>
<li><strong>The 3NB Imaging Workflow</strong> — the end-to-end scenario, from customer prep to return.</li>
<li><strong>Severity, Checklists, and Everyday Rules</strong> — consequences and quick-reference practice.</li>
<li><strong>Special Handling and the Bottom Line</strong> — upclassing, working notes, and stop-the-line judgment.</li>

<h1 id="1-scope-and-ground-rules">1. Scope and Ground Rules</h1>
<p>This deck provides a <strong>policy-level SOP model</strong> for SIPR laptops, hard drives, removable media, and related classified/COMSEC material.</p>
<p>It does <strong>not</strong> replace:</p>
<ul>
<li>Local Command Security Manager direction.</li>
<li>COMSEC Manager/KMI Operating Account guidance.</li>
<li>Sensitive Compartmented Information (SCI) and Special Access Program (SAP)-specific rules.</li>
<li>Local vault/open-storage approval documentation.</li>
</ul>
<p>When local policy is stricter than this deck, use the stricter rule.<sup><a href="#ref-1">[1]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> treating local procedures as optional can turn a minor administrative mistake into an accountability failure.</div>

<h1 id="2-classified-information-vs-classified-material">2. Classified Information vs. Classified Material</h1>
<p><strong>Classified information</strong> is national-security information marked Confidential, Secret, or Top Secret.</p>
<p><strong>Classified material</strong> is the physical or digital object that contains, stores, records, or embeds classified information.</p>
<p>Examples:</p>
<ul>
<li>SIPR laptop.</li>
<li>Classified hard drive or solid-state drive.</li>
<li>Removable media.</li>
<li>Printed document.</li>
<li>COMSEC keying material or equipment.</li>
</ul>
<p>Marine Corps policy treats classified National Security Information as including any matter, document, product, substance, or item of equipment on or in which classified information is recorded or embedded.<sup><a href="#ref-1">[1]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> if a laptop chassis is tracked but the classified drive is not, the command may lose accountability for the actual classified material.</div>
</section>

<h1 id="3-what-is-a-cmcc">3. What Is a CMCC?</h1>
<p>A <strong>Classified Material Control Center (CMCC)</strong> is a local command control function for receiving, logging, storing, issuing, inventorying, and returning classified material.</p>
<p>Marine Corps policy lists CMCC programs as a best practice for classified-material control, including document-control and secondary-control-point functions.<sup><a href="#ref-2">[2]</a></sup></p>
<p>A <strong>secondary control point</strong> is a subordinate custody point—such as a section, lab, vault, or room custodian—that controls classified material locally while remaining accountable to the primary CMCC/security program.</p>
<p><strong>Plain meaning:</strong> the CMCC is the place or function that answers, “Who has this classified item, where is it, and what record proves it?”</p>
<div class="callout counter"><strong>Counter Example:</strong> without a CMCC-style control point, classified assets can move by habit, email, or word of mouth instead of by accountable custody.</div>
</section>

<h1 id="4-what-is-comsec">4. What Is COMSEC?</h1>
<p><strong>Communications Security (COMSEC)</strong> protects communications from exploitation and ensures authenticity.</p>
<p>COMSEC includes:</p>
<ul>
<li>Cryptographic security.</li>
<li>Transmission security.</li>
<li>Emissions security.</li>
<li>Physical security of COMSEC material and information.<sup><a href="#ref-3">[3]</a></sup></li>
</ul>
<p><strong>COMSEC material</strong> includes items designed to secure or authenticate telecommunications, including key, equipment, modules, devices, documents, hardware, firmware, or software that embody cryptographic logic or perform COMSEC functions.<sup><a href="#ref-4">[4]</a></sup></p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> mishandling COMSEC material may be more serious than ordinary property loss because it can affect cryptographic trust and mission communications.</div>
</section>

<h1 id="5-what-are-cmcs-ekms-kmi-and-koa">5. What Are CMCS, EKMS, KMI, and KOA?</h1>
<p>The <strong>COMSEC Material Control System (CMCS)</strong> is the logistics and accounting system used to distribute, control, and safeguard COMSEC material marked <strong>&quot;CRYPTO&quot;</strong>.<sup><a href="#ref-5">[5]</a></sup></p>
<p>Here, <strong>&quot;CRYPTO&quot;</strong> is a COMSEC marking/control label—not another acronym to decode.</p>
<p><strong>Electronic Key Management System (EKMS)</strong> and <strong>Key Management Infrastructure (KMI)</strong> are examples of tools used by CMCS; KMI provides generation, production, storage, protection, distribution, control, tracking, and destruction for cryptographic keying material.<sup><a href="#ref-5">[5]</a></sup><sup><a href="#ref-6">[6]</a></sup></p>
<p>A <strong>KMI Operating Account (KOA)</strong> is the KMI account relationship used to manage devices and control distribution of KMI products to those devices.<sup><a href="#ref-7">[7]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> using a property receipt, like a consolidated memorandum receipt (CMR), alone for COMSEC/KMI material may fail to meet COMSEC accountability requirements.</div>
</section>

<h1 id="6-what-is-cci">6. What Is CCI?</h1>
<p>A <strong>Controlled Cryptographic Item (CCI)</strong> is normally unclassified equipment or a cryptographic component handled through the COMSEC Material Control System, an equivalent control system, or both.<sup><a href="#ref-8">[8]</a></sup></p>
<p><strong>Important distinction:</strong> CCI may be unclassified by itself, but it is still controlled.</p>
<p>Examples may include approved cryptographic devices, components, or modules that perform a COMSEC function.</p>
<div class="callout counter"><strong>Counter Example:</strong> treating CCI as ordinary IT gear can create a COMSEC incident even when the item is not marked classified.</div>
</section>

<h1 id="7-what-are-sf-153-sd-572-and-cbaf">7. What Are SF-153, SD-572, and CBAF?</h1>
<p><strong>SF-153</strong> is the COMSEC Material Report. It may support transfer, inventory, destruction, hand-receipt, or other COMSEC material reporting actions.<sup><a href="#ref-9">[9]</a></sup></p>
<p><strong>SD-572</strong> is the Cryptographic Access Certification and Termination form used to certify and terminate access to U.S. classified cryptographic information.<sup><a href="#ref-10">[10]</a></sup></p>
<p><strong>CBAF:</strong> for this deck, CBAF refers to the local <strong>Command Billet Access Form</strong> or equivalent billet/access validation artifact. Treat it as a local command record that may support access validation, not as a substitute for clearance, need-to-know, courier appointment, SD-572, SF-153, or CMCC custody records unless local policy explicitly says otherwise.</p>
<div class="callout counter"><strong>Counter Example:</strong> using the wrong validation document may mean the recipient was never properly authorized to receive or access the material.</div>
</section>

<h1 id="8-policy-baseline">8. Policy Baseline</h1>
<p>Classified material must be protected by one of two conditions:<sup><a href="#ref-11">[11]</a></sup></p>
<ol>
<li>Stored as required by policy.</li>
<li>Under the personal observation and control of an authorized person.<sup><a href="#ref-11">[11]</a></sup></li>
</ol>
<p>Before access is granted, the person must have:<sup><a href="#ref-12">[12]</a></sup></p>
<ul>
<li>Proper clearance eligibility.</li>
<li>SF-312 on file.</li>
<li>Need-to-know.</li>
<li>Any additional COMSEC, cryptographic, NATO, SCI, SAP, or local briefing required for the material.<sup><a href="#ref-12">[12]</a></sup></li>
</ul>
<div class="callout counter"><strong>Counter Example:</strong> custody without authorization is not just poor paperwork; it can be unauthorized disclosure.</div>
</section>

<h1 id="9-who-may-sign-for-classified-sipr-assets">9. Who May Sign for Classified SIPR Assets?</h1>
<p>Qualified signers should be appointed or otherwise documented by the command before accepting custody.<sup><a href="#ref-12">[12]</a></sup></p>
<p>Typical qualified signers include:</p>
<ul>
<li>Command Security Manager or alternate.</li>
<li>CMCC custodian or alternate.</li>
<li>COMSEC Manager, KOA Manager, or alternate, when COMSEC/KMI material is involved.</li>
<li>Formally appointed hand-receipt holder or lab custodian.</li>
</ul>
<p>Do <strong>not</strong> let an ordinary end user sign merely because they are the technical point of contact.<sup><a href="#ref-12">[12]</a></sup></p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> release to an unqualified signer is at least an accountability failure and may become a compromise if access was not authorized.</div>
</section>

<h1 id="10-how-to-validate-a-recipient-before-release">10. How to Validate a Recipient Before Release</h1>
<p>Before releasing the asset, validate:</p>
<ol>
<li>Identity: CAC/DoD ID and unit affiliation.</li>
<li>Eligibility: clearance level and access record.</li>
<li>Need-to-know: mission requirement for that asset.</li>
<li>Appointment: courier letter/card, access roster, CMCC appointment, COMSEC appointment, or lab-custodian designation.</li>
<li>Special access: SD-572 or local COMSEC/KMI validation when classified cryptographic information is involved.<sup><a href="#ref-13">[13]</a></sup></li>
</ol>
<p>For classified cryptographic information, SD-572 Section I must be executed before access, and Section II must be executed when access is no longer required.<sup><a href="#ref-14">[14]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> if qualification is assumed instead of validated, the release may become a security violation or compromise.</div>
</section>

<h1 id="11-core-custody-records">11. Core Custody Records</h1>
<p>Use the record required by the material type.<sup><a href="#ref-9">[9]</a></sup><sup><a href="#ref-10">[10]</a></sup><sup><a href="#ref-22">[22]</a></sup></p>
<table>
<thead>
<tr>
<th>Material type</th>
<th>Minimum record</th>
</tr>
</thead>
<tbody>
<tr>
<td>Ordinary classified SIPR asset</td>
<td>CMCC log and local hand receipt</td>
</tr>
<tr>
<td>Classified hard drive/media</td>
<td>CMCC/media log and hand receipt</td>
</tr>
<tr>
<td>COMSEC material</td>
<td>SF-153 or COMSEC-account-directed record</td>
</tr>
<tr>
<td>Classified cryptographic information access</td>
<td>SD-572 and access briefing/debriefing record</td>
</tr>
<tr>
<td>Property accountability</td>
<td>Property record, GCSS-MC/DPAS/local equivalent</td>
</tr>
</tbody>
</table>
<p>The custody record should identify the item without adding unnecessary classified operational detail.<sup><a href="#ref-15">[15]</a></sup></p>

<h1 id="12-temporary-hand-receipts">12. Temporary Hand Receipts</h1>
<p>A temporary hand receipt should record:</p>
<ul>
<li>Releasing unit and accepting unit.</li>
<li>Releasing official, receiving official, and witness when required.</li>
<li>Courier name and courier authorization reference.</li>
<li>Chassis serial number and property tag.</li>
<li>Hard-drive or storage-media serial numbers.</li>
<li>Classification level and control caveats.</li>
<li>Exact purpose, date/time, expected return, and temporary storage location.</li>
</ul>
<p>Material removed from an approved open-storage area must be controlled and accounted for until returned.<sup><a href="#ref-15">[15]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> incomplete hand receipts make it difficult to determine last known location, responsible person, and whether a loss occurred.</div>
</section>

<h1 id="13-serial-number-validation">13. Serial Number Validation</h1>
<p>Validate both:</p>
<ol>
<li><strong>Chassis serial/property tag</strong> for the laptop or workstation.</li>
<li><strong>Drive/media serials</strong> for internal drives, removable drives, SSDs, and other classified storage media.</li>
</ol>
<p>Marine Corps policy specifically includes removable or removed classified hard drives, external hard drives, computers, disks, documents, and other media within classified control measures.<sup><a href="#ref-16">[16]</a></sup></p>
<p><strong>Best practice:</strong> record drive serials at release, intake, before imaging, after imaging, before return, and at final receipt.</p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> a missing or swapped hard drive is potentially a loss of classified material, even if the laptop chassis is present.</div>

<h1 id="14-courier-requirements">14. Courier Requirements</h1>
<p>For this SOP, a courier package should include:</p>
<ul>
<li>Courier appointment letter.</li>
<li>Issued courier card or DD Form 2501 if used locally.</li>
<li>DoD ID and government photo ID.</li>
<li>Copy of inventory or hand receipt retained by courier.</li>
<li>Office-retained copy of inventory or hand receipt.</li>
<li>Locked, opaque, durable container such as an approved Pelican-style case.</li>
<li>Inner sealed package or administrative packet as locally required.</li>
</ul>
<p>DoD policy requires written authorization for persons approved to escort, courier, or hand-carry classified material, and that authorization may be a letter, courier card, travel orders, or other written document.<sup><a href="#ref-17">[17]</a></sup></p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> couriering without documented authorization is an infraction at minimum; loss of custody can become a violation or compromise.</div>
</section>

<h1 id="15-packaging-and-pelican-case-standards">15. Packaging and Pelican Case Standards</h1>
<p>DoD policy requires classified material being transferred to be enclosed in two opaque, sealed envelopes, wrappings, or containers durable enough to protect against exposure and show tampering.<sup><a href="#ref-18">[18]</a></sup></p>
<p>For hand-carry outside an activity, a locked briefcase or zippered pouch may serve as the outer wrapper; a locally approved locked Pelican-style case can serve the same practical purpose if approved by the Security Manager and compatible with local policy.<sup><a href="#ref-19">[19]</a></sup></p>
<p>Do not mark the outside of the container in a way that reveals or advertises classified contents.<sup><a href="#ref-20">[20]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> poor packaging can create accidental exposure, tampering uncertainty, or unauthorized disclosure.</div>
</section>

<h1 id="16-government-vehicle-vs-pov">16. Government Vehicle vs. POV</h1>
<p><strong>Preferred method:</strong> government vehicle with official routing and direct travel.</p>
<p><strong>POV use:</strong> only when authorized by the command or Security Manager and when the courier can maintain continuous personal custody.<sup><a href="#ref-21">[21]</a></sup></p>
<p>Courier rules apply regardless of vehicle:</p>
<ul>
<li>Do not leave the material unattended.</li>
<li>Do not make unauthorized stops.</li>
<li>Do not open the package en route except under policy-defined circumstances.</li>
<li>Arrange approved secure storage if travel is interrupted or overnight storage becomes necessary.<sup><a href="#ref-21">[21]</a></sup></li>
</ul>
<div class="callout deviation"><strong>Deviation Consequence:</strong> leaving classified material in a POV, even briefly, may be a reportable security violation and may become a loss or compromise.</div>
</section>

<h1 id="17-acceptance-at-the-receiving-unit">17. Acceptance at the Receiving Unit</h1>
<p>The receiving unit should sign only after completing a physical sighting and record check.<sup><a href="#ref-15">[15]</a></sup></p>
<p>Acceptance should include:</p>
<ol>
<li>Validate courier identity and courier authority.</li>
<li>Compare hand receipt/SF-153 to the physical asset.</li>
<li>Verify chassis serial and drive/media serials.</li>
<li>Inspect seals, locks, and packaging for tampering.</li>
<li>Record date/time, location, receiving official, and witness if required.</li>
<li>Refuse or annotate discrepancies before signing.</li>
</ol>
<div class="callout deviation"><strong>Deviation Consequence:</strong> signing before verification creates false custody and may conceal loss, tampering, or unauthorized substitution.</div>
</section>

<h1 id="18-how-the-hand-receipt-enters-inventory">18. How the Hand Receipt Enters Inventory</h1>
<p>The owning unit should annotate its inventory when classified material leaves approved open storage or changes temporary custody.<sup><a href="#ref-22">[22]</a></sup></p>
<blockquote>
<p>“Issued on temporary hand receipt to [unit] for [purpose], [date/time], expected return [date/time].”</p>
</blockquote>
<p>The receiving unit should enter the asset into a temporary custody log with:<sup><a href="#ref-22">[22]</a></sup></p>
<ul>
<li>Owning unit.</li>
<li>Receiving custodian.</li>
<li>Room or container location.</li>
<li>Authorized movement locations.</li>
<li>Work status.</li>
<li>Return status.</li>
</ul>
<p>Marine Corps policy encourages logs for hard-copy classified information and requires control and accountability when material leaves open storage.<sup><a href="#ref-22">[22]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> if neither unit inventory reflects temporary custody, the asset is effectively uncontrolled.</div>
</section>

<h1 id="19-monthly-and-event-driven-inventory">19. Monthly and Event-Driven Inventory</h1>
<p>Marine Corps policy sets minimum classified-material accountability rules, but CMCC programs commonly use stricter local controls for recurring physical accountability.<sup><a href="#ref-2">[2]</a></sup></p>
<p>For this battalion, treat <strong>100% CMCC inventory</strong> as the normal monthly accountability standard, not an exceptional event.</p>
<p>Also conduct a <strong>100% inventory</strong> when any of these triggers occur under the local battalion order:</p>
<ul>
<li>20% or more of the inventory changes.</li>
<li>Primary or alternate custodians turn over.</li>
<li>A security incident, discrepancy, suspected compromise, or loss concern occurs.</li>
<li>Temporary customer assets are received, imaged, transferred, or returned.</li>
</ul>
<p>Keep the policy baseline in mind: Top Secret has formal minimum inventory requirements, and Secret/below material removed from approved open storage must remain controlled and accounted for until returned.<sup><a href="#ref-23">[23]</a></sup><sup><a href="#ref-24">[24]</a></sup></p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> delayed inventory can delay discovery of loss and increase damage assessment scope.</div>
</section>

<h1 id="20-scenario-customer-unit-prepares-asset-for-3nb-imaging">20. Scenario: Customer Unit Prepares Asset for 3NB Imaging</h1>
<p>For this deck, <strong>3NB</strong> refers to the receiving/imaging unit or CMCC function performing the SIPR imaging work.</p>
<p>The customer unit should:</p>
<ol>
<li>Contact its Security Manager, CMCC, vault custodian, or COMSEC Manager as applicable.</li>
<li>Retrieve the SIPR asset from approved storage.</li>
<li>Validate chassis and drive/media serials.</li>
<li>Prepare the hand receipt, SF-153 if COMSEC material is involved, and courier packet.</li>
<li>Appoint or validate the courier.</li>
<li>Package the asset in the approved locked case.</li>
<li>Retain a complete copy of the transfer packet.</li>
</ol>
<p>The asset should not be released directly from an end user or help desk without CMCC/security accountability.<sup><a href="#ref-2">[2]</a></sup><sup><a href="#ref-12">[12]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> bypassing CMCC creates a custody gap before the asset ever reaches 3NB.</div>
</section>

<h1 id="21-scenario-3nb-receives-the-asset">21. Scenario: 3NB Receives the Asset</h1>
<p>At 3NB, the asset should be received by one of the following documented/authorized custodians:<sup><a href="#ref-12">[12]</a></sup></p>
<ul>
<li>3NB CMCC custodian or alternate.</li>
<li>Command Security Manager or alternate.</li>
<li>COMSEC/KOA Manager or alternate when COMSEC/KMI applies.</li>
<li>Formally appointed SIPR imaging lab custodian.</li>
</ul>
<p>The 3NB receiver should:<sup><a href="#ref-15">[15]</a></sup></p>
<ol>
<li>Verify courier authority.</li>
<li>Inspect package condition.</li>
<li>Validate all recorded serial numbers.</li>
<li>Sign receipt only after physical validation.</li>
<li>Enter the item into the 3NB temporary classified-material custody log.</li>
<li>Store the complete packet with the CMCC record, not just in the technician’s notes.</li>
</ol>
<div class="callout counter"><strong>Counter Example:</strong> if a technician signs without appointment, the record may not establish valid transfer of custody.</div>
</section>

<h1 id="22-scenario-imaging-lab-storage">22. Scenario: Imaging Lab Storage</h1>
<p>A SIPR imaging lab may store assets only if the room is approved for the classification level and storage method.<sup><a href="#ref-25">[25]</a></sup></p>
<p>If the room is <strong>not</strong> approved open storage, assets should be stored in a GSA-approved container, vault, or other approved storage when not under direct observation and control of an authorized person.<sup><a href="#ref-25">[25]</a></sup></p>
<p>An X.509/CAC/electronic lock helps control access, but DoD policy warns that electrically actuated locks do not, by themselves, substitute for required classified-storage locks or standards.<sup><a href="#ref-26">[26]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> an electronically controlled room that is not approved storage can still be improper classified storage.</div>
</section>

<h1 id="23-scenario-recording-location-inside-3nb">23. Scenario: Recording Location Inside 3NB</h1>
<p>The customer-to-3NB hand receipt should identify the receiving unit and authorized purpose.<sup><a href="#ref-15">[15]</a></sup></p>
<p>The 3NB internal custody log should record the most precise controlled location practical, such as:<sup><a href="#ref-22">[22]</a></sup></p>
<ul>
<li>Building.</li>
<li>Room number.</li>
<li>Vault/container number.</li>
<li>Imaging bench or cage identifier if locally used.</li>
<li>Date/time of internal movement.</li>
<li>Person moving the asset and witness if required.</li>
</ul>
<p><strong>Recommended wording:</strong> the customer receipt may state “3NB CMCC/SIPR imaging lab, approved storage locations only,” while the 3NB custody log records exact room/container movement.</p>
<div class="callout counter"><strong>Counter Example:</strong> building-only tracking may be insufficient if the asset cannot be immediately located during inventory.</div>
</section>

<h1 id="24-scenario-moving-customer-assets-between-rooms">24. Scenario: Moving Customer Assets Between Rooms</h1>
<p>Moving a customer asset between rooms should preserve accountability and approved storage; require:<sup><a href="#ref-15">[15]</a></sup><sup><a href="#ref-25">[25]</a></sup></p>
<ol>
<li>Authorized person moving the asset.</li>
<li>Continuous custody or proper packaging.</li>
<li>Update to internal custody log.</li>
<li>Witness or two-person integrity (TPI) when required by material type or local SOP.</li>
<li>Storage only in approved rooms or containers.</li>
</ol>
<p>A new customer hand receipt is not required for every internal room move if 3NB remains the accountable temporary custodian and the internal movement log is complete.<sup><a href="#ref-22">[22]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> unlogged internal movement can look identical to loss during an audit.</div>
</section>

<h1 id="25-scenario-imaging-complete-and-customer-notification">25. Scenario: Imaging Complete and Customer Notification</h1>
<p>When imaging is complete, 3NB should close out custody before release:<sup><a href="#ref-15">[15]</a></sup></p>
<ol>
<li>Reconcile chassis and drive/media serials.</li>
<li>Verify no extra classified media, labels, notes, or removable devices remain with the asset.</li>
<li>Close out lab work notes without adding unnecessary classified details.</li>
<li>Notify the customer unit’s CMCC, Security Manager, vault custodian, or COMSEC Manager—not merely the end user.</li>
<li>Require the customer to send an appointed courier with courier authorization.</li>
</ol>
<div class="callout counter"><strong>Counter Example:</strong> notifying only the end user can result in release to a person who lacks authority to accept custody.</div>
</section>

<h1 id="26-scenario-return-to-customer-unit">26. Scenario: Return to Customer Unit</h1>
<p>Return should mirror intake so custody remains documented through final receipt:<sup><a href="#ref-15">[15]</a></sup></p>
<ol>
<li>Customer courier arrives with valid authorization.</li>
<li>3NB validates courier identity and authority.</li>
<li>3NB and courier physically sight the asset.</li>
<li>Both parties validate chassis and drive/media serials.</li>
<li>3NB signs release and closes temporary custody log.</li>
<li>Customer signs acceptance and updates its inventory back to “on hand.”</li>
<li>Discrepancies are stopped, annotated, reported, and resolved before release when possible.</li>
</ol>
<div class="callout counter"><strong>Counter Example:</strong> a return without serial reconciliation can transfer an undetected discrepancy back to the customer unit.</div>
</section>

<h1 id="27-security-violation-severity-guide">27. Security Violation Severity Guide</h1>
<table>
<thead>
<tr>
<th>Failure</th>
<th>Likely severity</th>
</tr>
</thead>
<tbody>
<tr>
<td>Minor admin error corrected immediately</td>
<td>Infraction</td>
</tr>
<tr>
<td>Missing signature, incomplete access validation, expired courier card</td>
<td>Infraction to violation</td>
</tr>
<tr>
<td>Improper storage in unapproved room or unattended case</td>
<td>Violation; possible compromise</td>
</tr>
<tr>
<td>Release to uncleared/no-need-to-know person</td>
<td>Compromise</td>
</tr>
<tr>
<td>Asset, hard drive, or COMSEC material cannot be located</td>
<td>Loss</td>
</tr>
<tr>
<td>Falsified receipt, intentional bypass, or negligent handling</td>
<td>Serious violation; command investigation likely</td>
</tr>
</tbody>
</table>
<p>DoD characterizes an <strong>infraction</strong> as noncompliance that does not result in loss or compromise; a <strong>violation</strong> may result in loss or compromise; <strong>compromise</strong> means unauthorized disclosure; and <strong>loss</strong> occurs when classified information or equipment cannot be physically located or accounted for.<sup><a href="#ref-27">[27]</a></sup></p>
</section>

<h1 id="28-practical-intake-checklist">28. Practical Intake Checklist</h1>
<p>Before accepting a SIPR asset for imaging, confirm:<sup><a href="#ref-12">[12]</a></sup><sup><a href="#ref-15">[15]</a></sup></p>
<ul>
<li>Asset is expected and authorized.</li>
<li>Courier is appointed and has required documents.</li>
<li>Packaging is locked, opaque, sealed, and tamper-evident as required.</li>
<li>Receipt/SF-153 matches physical asset.</li>
<li>Chassis serial and media serials match.</li>
<li>Receiving person is appointed and qualified.</li>
<li>Storage location is approved.</li>
<li>Temporary custody log is updated immediately.</li>
</ul>
<div class="callout deviation"><strong>Deviation Consequence:</strong> each unchecked item is a potential custody, access, or storage failure.</div>
</section>

<h1 id="29-practical-return-checklist">29. Practical Return Checklist</h1>
<p>Before releasing the asset back to the customer, confirm:<sup><a href="#ref-15">[15]</a></sup></p>
<ul>
<li>Imaging is complete.</li>
<li>Asset and media serials reconcile.</li>
<li>No extra media or classified notes are included.</li>
<li>Customer CMCC/security point of contact was notified.</li>
<li>Courier authority is valid.</li>
<li>Return receipt is signed by qualified personnel.</li>
<li>3NB temporary custody log is closed.</li>
<li>Customer inventory is updated.</li>
</ul>
<div class="callout deviation"><strong>Deviation Consequence:</strong> a sloppy return can create a false record that hides loss, unauthorized access, or unresolved discrepancy.</div>
</section>

<h1 id="30-miscellaneous-rules-to-live-by">30. Miscellaneous Rules to Live By</h1>
<p>These rules prevent most avoidable CMCC mistakes:</p>
<ol>
<li><strong>If you cannot prove custody, stop and reconcile.</strong></li>
<li><strong>If the marking is unclear, treat it at the higher level until corrected.</strong></li>
<li><strong>If the person is not validated, do not release the asset.</strong></li>
<li><strong>If local policy is stricter, local policy wins.</strong></li>
</ol>
<div class="callout counter"><strong>Counter Example:</strong> convenience shortcuts usually become audit findings after the fact.</div>

<h1 id="31-upclassing-devices-to-sipr">31. Upclassing Devices to SIPR</h1>
<p>Do not treat “this laptop is now SIPR” as an informal technician decision.</p>
<p>Before a chassis or hard drive is upclassed or accepted as SIPR/classified material:<sup><a href="#ref-16">[16]</a></sup><sup><a href="#ref-22">[22]</a></sup><sup><a href="#ref-28">[28]</a></sup></p>
<ol>
<li>Security/CMCC authority approves the change and required storage path.</li>
<li>Supply/property chain of custody is validated from acquisition or transfer through current custodian.</li>
<li>The system or media is scanned/inspected under the approved local technical procedure before SIPR connection or imaging.</li>
<li>Chassis, drive, and removable-media serials are physically verified.</li>
<li>The device is marked for the resulting classification and caveats.</li>
<li>The SF inventory/local classified-material inventory is updated from unclassified/property-only status to classified custody status.</li>
<li>The CMCC control number is tied to the property tag, chassis serial, media serials, and chain-of-custody package.</li>
</ol>
<p>Classified control measures apply to computers, hard drives, disks, documents, and other media containing classified information.<sup><a href="#ref-16">[16]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> if the scan package or supply custody trail is missing, the command may not know what was connected to SIPR or who controlled the media before upclassification.<sup><a href="#ref-22">[22]</a></sup></div>
</section>

<h1 id="32-sipr-assets-are-not-user-carried-it-gear">32. SIPR Assets Are Not User-Carried IT Gear</h1>
<p>A SIPR laptop may look like ordinary IT equipment, but once it is a SIPR/classified asset it must move as classified material—not by casual user hand-carry.<sup><a href="#ref-11">[11]</a></sup><sup><a href="#ref-17">[17]</a></sup></p>
<p>Required movement path:</p>
<ol>
<li>CMCC/security release approval.</li>
<li>SF-153 when COMSEC material is involved, or the required local classified-material hand receipt/inventory record for non-COMSEC SIPR assets.</li>
<li>Valid courier appointment or written authorization.</li>
<li>Proper packaging, continuous custody, and receipt at the destination.</li>
<li>Inventory/control-number update showing who has custody and where the asset is located.<sup><a href="#ref-15">[15]</a></sup><sup><a href="#ref-17">[17]</a></sup><sup><a href="#ref-18">[18]</a></sup><sup><a href="#ref-22">[22]</a></sup></li>
</ol>
<div class="callout counter"><strong>Counter Example:</strong> “the user just moved their laptop” can become an undocumented transfer of classified material.</div>
</section>

<h1 id="33-working-notes-drafts-and-scratch-documents">33. Working Notes, Drafts, and Scratch Documents</h1>
<p>Working notes can become classified material as soon as they contain classified information.<sup><a href="#ref-28">[28]</a></sup></p>
<p>For working papers or notes:<sup><a href="#ref-28">[28]</a></sup></p>
<ul>
<li>Mark the <strong>top and bottom</strong> with the highest classification present.</li>
<li>Date the working paper when created.</li>
<li>Add portion markings when the notes will be shared, retained, or turned into a formal product.</li>
<li>Use source documents or security guidance; do not invent classification decisions.</li>
</ul>
<p>DoD marking policy specifically addresses classified working papers and standardized banner/portion markings.<sup><a href="#ref-28">[28]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> an unmarked notebook page can still contain classified information and must be protected accordingly.</div>
</section>

<h1 id="34-maintain-or-destroy-working-notes">34. Maintain or Destroy Working Notes</h1>
<p>Do not let scratch paper become an unofficial archive.<sup><a href="#ref-28">[28]</a></sup><sup><a href="#ref-29">[29]</a></sup></p>
<p>When working notes are no longer needed:</p>
<ul>
<li>Destroy them using approved classified-destruction procedures.</li>
<li>Record destruction when local SOP or the material type requires it.</li>
<li>If retained, store and account for them at the proper classification level.</li>
<li>If released outside the workspace, mark, route, and receipt them like any other classified material.<sup><a href="#ref-18">[18]</a></sup><sup><a href="#ref-22">[22]</a></sup></li>
</ul>
<p>Classified information must be destroyed only by authorized means that prevent reconstruction.<sup><a href="#ref-29">[29]</a></sup></p>
<div class="callout counter"><strong>Counter Example:</strong> forgotten notes can create the same loss or compromise problem as a missing drive.</div>
</section>

<h1 id="35-when-in-doubt-stop-the-line">35. When in Doubt, Stop the Line</h1>
<p>Pause the movement, imaging, or return when:</p>
<ul>
<li>Serial numbers do not match.</li>
<li>Markings, caveats, or classification are unclear.</li>
<li>The courier or receiver is not validated.</li>
<li>Packaging, locks, seals, or storage approval are questionable.</li>
<li>Notes, removable media, or labels appear unexpectedly.</li>
</ul>
<p>Escalate to the Security Manager, CMCC custodian, COMSEC Manager, KOA Manager, or chain of command before continuing.</p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> stopping for five minutes is cheaper than reconstructing custody after a reportable incident.</div>
</section>

<h1 id="36-bottom-line">36. Bottom Line</h1>
<p>CMCC control is about answering four questions at all times:</p>
<ol>
<li><strong>What</strong> classified material exists?</li>
<li><strong>Where</strong> is it right now?</li>
<li><strong>Who</strong> is responsible for it?</li>
<li><strong>What record</strong> proves the chain of custody?</li>
</ol>
<p>For SIPR imaging workflows, the technical task is not complete until the custody record is complete.<sup><a href="#ref-15">[15]</a></sup><sup><a href="#ref-22">[22]</a></sup></p>
<div class="callout deviation"><strong>Deviation Consequence:</strong> if the record cannot prove custody, the command may have to treat the situation as a potential loss or compromise.</div>
</section>
